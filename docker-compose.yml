services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      AI_RADIO_DB_PATH: /data/ai_radio.sqlite3
      AI_RADIO_DATA_DIR: /data
      AI_RADIO_SEARXNG_URL: http://searxng:8080
      AI_RADIO_VOICEVOX_URL: http://voicevox:50021
    volumes:
      - ./data:/data
    depends_on:
      searxng:
        condition: service_healthy
      voicevox:
        condition: service_healthy

  voicevox:
    image: voicevox/voicevox_engine:cpu-latest
    ports:
      - "50021:50021"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://localhost:50021/version"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
