<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Radio</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 920px; margin: 32px auto; padding: 0 16px; }
      button { font-size: 16px; padding: 8px 14px; }
      audio { width: 100%; margin: 16px 0; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 12px 0; }
      .muted { color: #666; }
      code { background: #f4f4f4; padding: 2px 4px; }
    </style>
  </head>
  <body>
    <h1>AI Radio</h1>
    <p class="muted">最新2本の番組を交互に24時間ループ再生します。</p>
    <button id="start">Start</button>
    <audio id="player" controls></audio>
    <div id="status" class="card">Loading...</div>
    <h2>Queue</h2>
    <div id="queue"></div>

    <script>
      const player = document.getElementById("player");
      const statusEl = document.getElementById("status");
      const queueEl = document.getElementById("queue");
      const startBtn = document.getElementById("start");
      let queue = [];
      let idx = 0;
      let playbackId = null;

      async function api(path, options) {
        const res = await fetch(path, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      }

      async function refresh() {
        const status = await api("/api/status");
        queue = status.queue || [];
        statusEl.innerHTML = `
          <div>pending jobs: <code>${status.pending_jobs}</code></div>
          <div>last error: <code>${status.last_error || "none"}</code></div>
        `;
        queueEl.innerHTML = queue.map((p, i) => `
          <div class="card">
            <h3>${i + 1}. ${p.topic_title}</h3>
            <div class="muted">${p.generated_at} / ${p.topic_era} / ${p.tags.join(", ")}</div>
            <div>sources: ${p.sources.map(s => `<a href="${s.url}" target="_blank" rel="noreferrer">${s.title}</a>`).join(" / ")}</div>
          </div>
        `).join("") || "<p>番組生成待ちです。Codex workerとVOICEVOXの状態を確認してください。</p>";
      }

      async function playCurrent() {
        if (!queue.length) {
          await refresh();
          if (!queue.length) return;
        }
        const program = queue[idx % queue.length];
        const started = await api(`/api/playback/${program.id}/start`, { method: "POST" });
        playbackId = started.playback_id;
        player.src = program.audio_url + `?t=${Date.now()}`;
        await player.play();
      }

      player.addEventListener("ended", async () => {
        if (playbackId) {
          await api("/api/playback/end", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ playback_id: playbackId, status: "completed" })
          });
        }
        await refresh();
        idx = (idx + 1) % Math.max(queue.length, 1);
        await playCurrent();
      });

      startBtn.addEventListener("click", async () => {
        await refresh();
        await playCurrent();
      });

      refresh();
      setInterval(refresh, 30000);
    </script>
  </body>
</html>
